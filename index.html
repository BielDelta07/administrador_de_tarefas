<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
</head>
<body>
    <header>
        <h1>Lista de Tarefas</h1>
        <nav>
            <!-- Links de navegaçaõ corrigidos com as âncoras -->
             <a href="">Início</a>
             <a href="">Tarefas</a>
             <a href="">Contato</a>
        </nav>
    </header>
    <div id="inicio" class="container">
        <h2>Adicionar novas tarefas</h2>
        <div>
            <!-- input:text#tarefaInput -->
            <input type="text" placeholder="Digite uma tarefa" id="tarefaInput">
            <button onclick="AdicionarTarefa()">Adicionar</button>
        </div>
        <ul id="listaTarefas"></ul>
    </div>

    <footer id="Contato">
    <p>&copy; 2026 SENAI - Shaolin Matador de Porco. Todos os direitos reservados.</p>
    </footer>
    <script>
        let tarefas = [];

        function AdicionarTarefa(){
            const input = document.getElementById('tarefaInput');
            // Função Trim é um método para juntar outros valores e tirar os espaços em branco desnecessários
            const tarefa = input.value.trim();
            if(tarefa){
                tarefas.push(tarefa); //push é função para mexer com o array (adicionar no vetor)
                input.value = '';
                atualizarLista(); //função a ser criada mais tarde
            }
        }
        function removerTarefa(index){
            tarefas.splice(index,1);
            atualizarLista();
        }
        function atualizarLista(){
            const lista = document.getElementById('listaTarefas');
            lista.innerHTML = '';
            tarefas.forEach((tarefa,index) => {
                const li = document.creaateElement('li');
                li.innerHTML = `${tarefa} <button
                 onclick="removerTarefa(${index})">Remover</button>`;
                 lista.appendChild(li);
            });
        }
    </script>
</body>
</html>
